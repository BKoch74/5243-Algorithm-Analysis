
<div style="padding: 1rem 0;">
  <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Workload D — heavy lookups (n inserts, 5n lookups)</div>
  <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 16px;">Comparisons by structure and problem size</div>
  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#185FA5;"></span>BST</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;"></span>Hash Table</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#D85A30;"></span>Linked List</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#7F77DD;"></span>Sorted Array</span>
  </div>
  <div style="position:relative;width:100%;height:320px;">
    <canvas id="chartD"></canvas>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('chartD'), {
  type: 'bar',
  data: {
    labels: ['1,000', '5,000', '10,000', '20,000'],
    datasets: [
      { label: 'BST',          data: [70150, 452237, 984172, 2133839],          backgroundColor: '#185FA5' },
      { label: 'Hash Table',   data: [4135, 23372, 47378, 94345],               backgroundColor: '#1D9E75' },
      { label: 'Linked List',  data: [4605800, 114538571, 458208545, 1834724093], backgroundColor: '#D85A30' },
      { label: 'Sorted Array', data: [64208, 391480, 842860, 1805444],          backgroundColor: '#7F77DD' }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString()
        }
      }
    },
    scales: {
      x: { title: { display: true, text: 'Problem size (n)', font: { size: 12 } } },
      y: {
        type: 'logarithmic',
        title: { display: true, text: 'Comparisons (log scale)', font: { size: 12 } },
        ticks: {
          callback: v => {
            if (v === 1000) return '1K';
            if (v === 10000) return '10K';
            if (v === 100000) return '100K';
            if (v === 1000000) return '1M';
            if (v === 10000000) return '10M';
            if (v === 100000000) return '100M';
            if (v === 1000000000) return '1B';
            return null;
          }
        }
      }
    }
  }
});
</script>
